name: EscoBoard Worklog Reminder

on:
  # 予定実績の未登録リマインド判定。Vercel Hobby の cron 枠は使えないため
  # GitHub Actions schedule で駆動する（AGENTS.md）。
  # JST 平日 8-18時に2時間おき（UTC 23,1,3,5,7 = JST 8,10,12,14,16時）。
  # 平日/業務時間/休み判定はエンドポイント側(isWithinWorkWindow)が正典。
  # 窓外に当たった起動は skipped を返すだけで無害。現状エンドポイントは記録のみ(ドライラン)。
  schedule:
    - cron: "0 23,1,3,5,7 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Call worklog reminder endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/body -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://portal.esco-duct.com/api/escoboard/cron/worklog-reminder")
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/body || true; echo ""
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "worklog-reminder endpoint returned non-200: $HTTP_STATUS"; exit 1
          fi
          echo "worklog reminder check completed."
