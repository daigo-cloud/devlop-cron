name: CAD Worksheet Import

on:
  # 平日日中（JST 9〜19時台）に毎時同期。
  # Hobby プランの Vercel cron は1日1回まで（かつ既に2件使用中）なので GitHub Actions で駆動する
  schedule:
    - cron: "0 0-10 * * 1-5" # UTC 0-10 = JST 9-19
  # 手動実行
  workflow_dispatch:

# 同一ワークフローの連続起動では古い実行をキャンセルし多重実行を防ぐ。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call CAD import sync endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/sync_body -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://portal.esco-duct.com/api/escoboard/cad-import/sync?apply=true")
          echo "HTTP status: $HTTP_STATUS"
          echo "Response:"
          cat /tmp/sync_body || true
          echo ""
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "CAD import sync returned non-200 status: $HTTP_STATUS"
            exit 1
          fi
          echo "CAD import sync completed."
