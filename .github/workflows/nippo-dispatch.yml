# 日報ユーザー別リマインド配信(旧verbose-waddle GET /api/cron/dispatch相当)。
# 監視レジストリ(devlop lib/monitoring/cron.ts jobKey `nippo/dispatch`・期待60分)には
# 登録済みだったが、呼び出し元のGitHub Actionsワークフローが未作成だった対応漏れ
# (2026-07-21 watchdog stale検知)を解消するために新設。
# 曜日/時刻ごとの配信要否はエンドポイント内で判定するため、本ワークフローは
# 毎時無条件で叩けばよい。
# 公開リポ devlop-cron で実行（private Actions 課金を避ける）。
# エンドポイントは CRON_SECRET ではなく NIPPO_CRON_KEY(Bearer) で保護されている
# （日報送信系は鍵分離設計のため別鍵）。リポシークレット NIPPO_CRON_KEY に
# 本番Azureアプリ設定と同値を登録しておくこと（本ワークフローでは値を扱わない）。
name: Nippo Reminder Dispatch

on:
  schedule:
    # 毎時（分を13にずらしてGitHub Actionsの毎時00分混雑による遅延を緩和）。
    - cron: "13 * * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Nippo reminder dispatch
        run: |
          set -u
          URL="https://portal.esco-duct.com/api/nippo/cron/dispatch"
          echo "== POST ${URL}"
          code=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.NIPPO_CRON_KEY }}" "${URL}")
          echo "HTTP ${code}"
          head -c 1200 /tmp/out.json 2>/dev/null || true
          echo ""
          [ "${code}" = "200" ] || { echo "!! nippo/dispatch cron failed (HTTP ${code})"; exit 1; }
          echo "Nippo reminder dispatch completed."
